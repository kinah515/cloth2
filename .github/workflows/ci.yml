name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # 1. 기존의 빌드 및 푸시 작업 (GitHub가 제공하는 환경에서 실행)
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:buildcache,mode=max

  # 2. 로컬 컴퓨터(seolhan-ig-ui-MacBookPro)로 배포하는 CD 작업
  deploy-to-local:
    # build-and-push 작업이 성공적으로 끝난 후에만 실행되도록 설정
    needs: build-and-push
    
    # 내 컴퓨터에 설치한 Self-hosted Runner 위에서 실행
    runs-on: self-hosted
    
    steps:
      - name: Pull the latest Docker Image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:latest

      - name: Stop and remove old container
        # 기존에 실행 중인 동일한 이름의 컨테이너가 있다면 안전하게 종료하고 삭제합니다.
        # 처음 배포할 때는 컨테이너가 없어서 에러가 발생할 수 있으므로 `|| true`를 붙여 무시합니다.
        run: |
          docker stop fashion-ai-mvp || true
          docker rm fashion-ai-mvp || true

      - name: Run new container
        # 새로운 이미지를 바탕으로 포트 8000번에 맞춰 백그라운드(-d)로 컨테이너를 실행합니다.
        run: |
          docker run -d \
            --name fashion-ai-mvp \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/fashion-ai-mvp:latest
